<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart Dashboard Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 to-indigo-700 flex flex-col items-center justify-between p-6 relative">

    <!-- Top Header Navigation -->
    <header class="w-full max-w-7xl flex items-center justify-between sm:justify-start space-x-2 self-start mb-6 md:absolute md:top-6 md:left-6">
        <div class="flex items-center space-x-2 bg-white/10 backdrop-blur-md py-1.5 px-3 rounded-full border border-white/20">
            <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center font-bold text-indigo-600 text-sm shadow-sm">
                <button class="w-8 h-8 rounded-full bg-white flex items-center justify-center font-bold text-indigo-600 text-sm shadow-sm" type="button" onclick="location.href='page_login_main.html'" class="w-8 h-8 rounded-full bg-white flex items-center justify-center font-bold text-indigo-600 text-sm shadow-sm">ES</button>
            </div>
            <span class="text-white text-sm font-semibold tracking-wide">EduSmart Dashboard</span>
        </div>
    </header>

    <!-- Main Register Form Container -->
    <main class="w-full flex-1 flex items-center justify-center my-8">
        <form action="/register-student" method="POST" id="registerForm" class="bg-white/95 backdrop-blur-sm rounded-xl shadow-2xl p-8 w-full max-w-md border border-gray-100 transition-all duration-300">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-center text-gray-800">Create your student account</h2>
                <p class="text-sm text-center text-gray-500 mt-1">Register to access EduSmart student features</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label for="fullname" class="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required autocomplete="name" class="mt-1 block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-colors">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email" class="mt-1 block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-colors">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone (optional)</label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel" class="mt-1 block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-colors">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6" class="mt-1 block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-colors">
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" minlength="6" class="mt-1 block w-full px-3 py-2.5 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-colors">
                    <p id="pwError" class="mt-2 text-xs text-red-600 hidden">Passwords do not match.</p>
                </div>

                <div class="flex items-center">
                    <input id="agree" name="agree" type="checkbox" required class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                    <label for="agree" class="ml-2 block text-sm text-gray-600 cursor-pointer select-none">I agree to the <a href="#" class="text-indigo-600 font-medium">terms and conditions</a></label>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all active:scale-[0.99]">Register</button>
                </div>
            </div>

            <!-- Divider -->
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-wider">
                        <span class="px-3 bg-white text-gray-400 font-medium">Or continue with</span>
                    </div>
                </div>
            </div>

            <!-- Social Login Buttons -->
            <div class="mt-5 grid grid-cols-3 gap-3">
                <a href="#" aria-label="Sign up with Facebook" class="inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-500 hover:bg-gray-50 transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z" /></svg>
                </a>
                <a href="#" aria-label="Sign up with Twitter" class="inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-500 hover:bg-gray-50 transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" /></svg>
                </a>
                <a href="#" aria-label="Sign up with GitHub" class="inline-flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-500 hover:bg-gray-50 transition-colors">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.0.069-.608.009 1.004.754 1.53 1.53 1.53.892 0 1.677-.267 2.152-.397.09-.649.35-1.093.639-1.345-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" /></svg>
                </a>
            </div>

            <!-- Login Link -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">Already have an account? <a href="page_login_student.html" class="font-medium text-indigo-600 hover:text-indigo-500 transition-colors">Sign in</a></p>
            </div>
        </form>
    </main>

    <!-- Footer Area -->
    <footer class="w-full max-w-7xl flex flex-col sm:flex-row items-center justify-between text-white/70 text-xs py-4 space-y-2 sm:space-y-0 border-t border-white/10 mt-auto md:absolute md:bottom-0 md:left-6 md:right-6 md:w-[calc(100%-3rem)] md:border-t-0">
        <p>© 2026 EduSmart. All rights reserved.</p>
        <p class="font-medium">Version 1.0</p>
    </footer>

    <script>
    const form = document.getElementById('registerForm');
    const pw = document.getElementById('password');
    const cpw = document.getElementById('confirmPassword');
    const pwError = document.getElementById('pwError');

    function validatePasswords() {
        if (pw.value !== cpw.value) {
            pwError.classList.remove('hidden');
            return false;
        }
        pwError.classList.add('hidden');
        return true;
    }

    cpw.addEventListener('input', validatePasswords);
    pw.addEventListener('input', validatePasswords);

    form.addEventListener('submit', (e) => {
        if (!validatePasswords()) {
            e.preventDefault();
            cpw.focus();
        }
    });
    </script>
</body>
</html>
